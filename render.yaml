services:
  - type: web
    name: photo-valid
    env: python
    plan: free
    region: frankfurt
    runtime: python-3.11
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
