services:
  - type: web
    name: photo-valid
    env: python
    plan: free
    region: frankfurt
    buildCommand: |
      python --version
      python -m pip install --upgrade pip
      python -m pip install -r backend/requirements.txt
    startCommand: |
      python -m uvicorn backend.main:app --host 0.0.0.0 --port 10000
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONPATH
        value: /opt/render/project/src
