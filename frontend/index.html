<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PhotoValid – DV Lottery Photo Validator</title>
<style>
  :root{
    --bg:#f7f7fb; --card:#ffffff; --ink:#0f172a; --sub:#475569; --muted:#94a3b8;
    --pass:#16a34a; --warn:#f59e0b; --fail:#ef4444; --brand:#2563eb;
    --border:#e2e8f0; --shadow:0 6px 20px rgba(2,6,23,.06);
  }
  html.dark{ --bg:#0b1020; --card:#12182a; --ink:#e6edf6; --sub:#97a3b5; --muted:#6b7280; --border:#1f2b43; --shadow:0 6px 22px rgba(0,0,0,.35); }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";transition:background .3s, color .3s}
  .container{max-width:1100px;margin:24px auto;padding:16px}
  header{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
  .title{display:flex;gap:12px;align-items:center}
  .title h1{margin:0;font-size:20px}
  .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .btn{appearance:none;border:1px solid var(--border);background:var(--card);color:var(--ink);padding:8px 10px;border-radius:10px;cursor:pointer;box-shadow:var(--shadow);transition:all .2s}
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(2,6,23,.1)}
  .btn.brand{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600;padding:12px 20px;font-size:16px;border-radius:12px;box-shadow:0 4px 12px rgba(37,99,235,.3)}
  .btn.brand:hover{transform:scale(1.05);box-shadow:0 6px 16px rgba(37,99,235,.4)}
  .btn.ghost{background:transparent;box-shadow:none}
  .uploader{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .pane{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:12px;transition:all .3s}
  .preview-wrap{position:relative;border-radius:12px;overflow:hidden;background:#0b1729;display:flex;align-items:center;justify-content:center;min-height:320px}
  .preview-wrap img{max-width:100%;height:auto;display:block;user-select:none;-webkit-user-drag:none}
  canvas#overlay{position:absolute;inset:0;pointer-events:auto;touch-action:none}

  /* Summary banners (top-level errors / warnings / manual review) */
  .banner{border:1px solid var(--border);border-left-width:4px;border-radius:10px;padding:8px 10px;margin-bottom:10px;font-size:13px;background:var(--card)}
  .banner-title{font-weight:700;margin-bottom:4px}
  .banner ul{margin:0;padding-left:18px}
  .banner ul li{margin:2px 0;color:var(--sub)}
  .banner.fail{border-left-color:var(--fail)} .banner.fail .banner-title{color:var(--fail)}
  .banner.warn{border-left-color:var(--warn)} .banner.warn .banner-title{color:var(--warn)}
  .banner.review{border-left-color:var(--muted)} .banner.review .banner-title{color:var(--sub)}

  /* Compact validations */
  .results{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:12px;margin-top:16px;transition:all .3s}
  .results h3{margin:0 0 8px 0;font-size:16px}
  .rows{display:grid;gap:8px}
  .row{border:1px solid var(--border);border-left-width:4px;border-radius:10px;padding:8px 10px;background:var(--card);cursor:pointer;transition:all .2s}
  .row:hover{transform:translateX(2px)}
  .row.pass{border-left-color:var(--pass)}
  .row.warn{border-left-color:var(--warn)}
  .row.fail{border-left-color:var(--fail)}
  .summary{display:grid;grid-template-columns:28px 1fr 80px 100px;gap:8px;align-items:center}
  .summary .status{font-size:18px}
  .label{font-weight:600}
  .value,.expected{color:var(--sub);font-variant-numeric:tabular-nums;font-size:13px}
  .details{display:none;margin-top:6px;color:var(--sub);font-size:13px;border-top:1px solid var(--border);padding-top:6px}
  .row.open .details{display:block}
  .rec{margin-bottom:4px}
  .fix{color:var(--brand);font-weight:500}

  /* Score meter */
  .score{display:flex;align-items:center;gap:12px;margin:8px 0 14px}
  .score svg{width:56px;height:56px}
  .score .pct{font-size:20px;font-weight:700}
  .meter-bg{stroke:#e5e7eb;opacity:.4}
  html.dark .meter-bg{stroke:#14203a}
  .meter-val{stroke:var(--brand);transition:stroke-dashoffset .6s ease, stroke .3s}

  /* Upload dropzone */
  .drop-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;background:var(--bg);cursor:pointer;transition:all .3s;margin-bottom:12px}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--brand);background:rgba(37,99,235,.05)}
  .drop-zone.has-file{border-style:solid;border-color:var(--pass)}

  /* Footer disclaimer */
  footer.disclaimer{margin-top:16px;background:transparent;color:var(--sub);border-top:1px dashed var(--border);padding-top:12px;font-size:12.5px}

  /* Loading spinner */
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Responsive */
  @media (max-width:900px){ 
    .uploader{grid-template-columns:1fr} 
    .summary{grid-template-columns:24px 1fr 60px 80px}
  }
  @media (max-width:520px){ 
    .summary{grid-template-columns:20px 1fr} 
    .value,.expected{display:none}
    .actions{justify-content:center}
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="title">
        <span>📷</span>
        <h1 data-i18n="app_title">DV Lottery Photo Validator</h1>
      </div>
      <div class="actions">
        <select id="langSelect" class="btn" aria-label="Language" style="padding:8px 10px">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="uk">Українська</option>
          <option value="uz">Oʻzbekcha</option>
          <option value="ar">العربية</option>
          <option value="fa">فارسی</option>
        </select>
        <button id="darkToggle" class="btn ghost">🌓</button>
        <button id="newPhotoBtn" class="btn ghost" data-i18n="new_photo" style="display:none">New Photo</button>
        <button id="validateBtn" class="btn brand" data-i18n="validate_btn" disabled>Validate</button>
      </div>
    </header>

    <section class="uploader">
      <div class="pane">
        <!-- Drop zone for file upload -->
        <div id="dropZone" class="drop-zone" data-i18n-title="upload_drop">
          <div>📤 <strong data-i18n="upload_title">Drag & drop your photo here</strong></div>
          <div style="color:var(--sub);margin-top:8px" data-i18n="upload_subtitle">or click to browse</div>
          <input id="fileInput" type="file" accept="image/*" hidden />
        </div>
        
        <div class="preview-wrap" style="display:none" id="previewWrap">
          <img id="photo" alt="preview" draggable="false" />
          <canvas id="overlay"></canvas>
        </div>
        
        <div style="display:none;gap:10px;align-items:center;justify-content:space-between;margin-top:8px" id="controls">
          <label><input type="checkbox" id="showHints" checked/> <span data-i18n="show_hints">Show alignment hints</span></label>
          <div style="display:flex;gap:8px">
            <button id="manualBtn" class="btn" data-i18n="manual_btn">Adjust Lines</button>
            <button id="saveManualBtn" class="btn brand" style="display:none" data-i18n="save_btn">Save & Re‑check</button>
            <button id="resetManualBtn" class="btn" style="display:none" data-i18n="reset_btn">Reset</button>
          </div>
        </div>
      </div>

      <div class="pane">
        <div class="score">
          <svg viewBox="0 0 36 36" role="img" aria-label="score">
            <circle class="meter-bg" cx="18" cy="18" r="16" fill="none" stroke-width="4"></circle>
            <circle id="meterVal" class="meter-val" cx="18" cy="18" r="16" fill="none" stroke-width="4" stroke-linecap="round" stroke-dasharray="100 100" stroke-dashoffset="100"></circle>
          </svg>
          <div>
            <div class="pct" id="scorePct">–%</div>
            <div class="sub" data-i18n="overall_quality">Overall quality</div>
          </div>
        </div>

        <button id="downloadPdfBtn" class="btn" style="display:none;width:100%;margin-bottom:10px" data-i18n="download_pdf">⬇ Download report (PDF)</button>

        <div id="banners" style="display:none"></div>

        <div class="results">
          <h3 data-i18n="checks_title">Validation Results</h3>
          <div class="rows" id="rows">
            <div style="text-align:center;color:var(--sub);padding:20px" data-i18n="no_results">
              Upload and validate a photo to see results
            </div>
          </div>
        </div>

        <footer class="disclaimer" data-i18n="disclaimer">
          ⚠️ This tool provides automated estimates based on DV Lottery guidelines. Always review your final photo before submission.
        </footer>
      </div>
    </section>
  </div>

  }
}

// API base URL.
// The backend serves this page AND exposes /api on the same origin, so a relative
// '/api' works on any host/port. The only exception is the standalone static-dev
// workflow, where the frontend is served separately on :5173 and the backend on :8000.
const API_BASE = (
  (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  && window.location.port === '5173'
) ? 'http://localhost:8000/api' : '/api';

function currentManualOverrides(){
  return {top:lines.top, eye:lines.eye, chin:lines.chin};
}

function syncOverlay(){
  const rect = img.getBoundingClientRect();
  overlay.width = rect.width * (window.devicePixelRatio||1);
  overlay.height= rect.height* (window.devicePixelRatio||1);
  overlay.style.width = rect.width + 'px';
  overlay.style.height= rect.height+ 'px';
  overlay.style.left = '0';
  overlay.style.top = '0';
  ctx.setTransform((window.devicePixelRatio||1),0,0,(window.devicePixelRatio||1),0,0);
  drawOverlay();
}

window.addEventListener('resize', syncOverlay);

// ✅ FIX 1: Adaptive contrast calculation for overlay lines
function contrastColorAtY(yCss){
  const y = Math.max(0, Math.min(overlay.height-1, yCss*(window.devicePixelRatio||1)));
  try{
    // Sample multiple points horizontally for better accuracy
    const samples = 5;
    let totalLum = 0;
    for(let i = 0; i < samples; i++){
      const x = (overlay.width / samples) * i * (window.devicePixelRatio||1);
      const px = ctx.getImageData(x, y, 1, 1).data;
      totalLum += 0.299*px[0] + 0.587*px[1] + 0.114*px[2];
    }
    const avgLum = totalLum / samples;
    // Use higher contrast threshold for better visibility
    return avgLum > 140 ? '#000000' : '#ffffff';
  }catch(e){ 
    return '#ffffff'; 
  }
}

function drawOverlay(){
  ctx.clearRect(0,0,overlay.width,overlay.height);
  if(!showHints.checked || !img.naturalHeight) return;
  
  const h = overlay.clientHeight, w = overlay.clientWidth;
  const dict = I18N[LANG] || I18N.en;
  const guideData = [
    {k:'top',  label:dict.line_top},
    {k:'eye',  label:dict.line_eye},
    {k:'chin', label:dict.line_chin}
  ];
  
  guideData.forEach(g=>{
    const y = Math.max(0, Math.min(h, lines[g.k]*h));
    const col = contrastColorAtY(y);
    
    // ✅ High-contrast line with shadow for maximum visibility
    ctx.strokeStyle = col; 
    ctx.lineWidth = 3;  // Thicker for better visibility
    ctx.setLineDash([8, 4]);  // More prominent dashes
    
    // Shadow for depth (opposite color)
    ctx.shadowColor = col === '#000000' ? '#ffffff' : '#000000';
    ctx.shadowBlur = 2;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    
    ctx.beginPath(); 
    ctx.moveTo(0,y); 
    ctx.lineTo(w,y); 
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    
    // ✅ Label with high-contrast background
    ctx.font = 'bold 13px system-ui, sans-serif';
    const metrics = ctx.measureText(g.label);
    const pad = 8;
    const labelY = Math.max(18, Math.min(h - 8, y - 10));
    
    // Strong background with border for maximum contrast
    const bgColor = col === '#000000' ? 'rgba(255, 255, 255, 0.95)' : 'rgba(0, 0, 0, 0.95)';
    const textColor = col === '#000000' ? '#000000' : '#ffffff';
    const borderColor = col === '#000000' ? '#000000' : '#ffffff';
    
    // Background rectangle
    ctx.fillStyle = bgColor;
    ctx.fillRect(10, labelY - 15, metrics.width + pad*2, 22);
    
    // Border for definition
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(10, labelY - 15, metrics.width + pad*2, 22);
    
    // Text
    ctx.fillStyle = textColor;
    ctx.fillText(g.label, 10 + pad, labelY);
  });
}

// Pointer drag for manual lines
function normYFromEvent(e){ 
  const r = overlay.getBoundingClientRect(); 
  return Math.max(0, Math.min(1, (e.clientY - r.top)/r.height)); 
}

function nearestKey(y){ 
  return ['top','eye','chin'].reduce((a,b)=> Math.abs(lines[a]-y) < Math.abs(lines[b]-y) ? a : b); 
}

overlay.addEventListener('pointerdown', e=>{ 
  if(!manualMode) return; 
  e.preventDefault(); 
  overlay.setPointerCapture(e.pointerId); 
  const y=normYFromEvent(e); 
  const k=nearestKey(y); 
  if(Math.abs(lines[k]-y)<0.06) dragging=k; 
});

overlay.addEventListener('pointermove', e=>{ 
  if(!manualMode||!dragging) return; 
  e.preventDefault(); 
  lines[dragging]=normYFromEvent(e); 
  drawOverlay(); 
});

overlay.addEventListener('pointerup', e=>{ 
  if(!manualMode) return; 
  overlay.releasePointerCapture(e.pointerId); 
  dragging=null; 
});

// Score meter update
function updateScoreMeter(pct){
  const clamped = Math.max(0, Math.min(100, pct||0));
  scorePct.textContent = clamped.toFixed(0) + '%';
  meterVal.setAttribute('stroke-dasharray', '100 100');
  meterVal.setAttribute('stroke-dashoffset', (100 - clamped).toString());
  meterVal.style.stroke = clamped>=80? 'var(--pass)' : (clamped>=60? 'var(--warn)' : 'var(--fail)');
}

// Compact row renderer
function rowIcon(status){ 
  return status==='pass'?'✅':(status==='warning'||status==='skipped'?'⚠️':'❌'); 
}

function escapeHTML(value){
  return String(value ?? '—')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function normalizeCheck(raw, fallbackName='Unknown Check'){
  if(!raw || typeof raw !== 'object') return null;
  const name = String(raw.parameter || raw.name || fallbackName);
  const status = ['pass','warning','fail','skipped'].includes(raw.status) ? raw.status : 'fail';
  return {...raw, name, parameter:name, status};
}

function normalizeResponse(raw){
  const data = raw && typeof raw === 'object' ? raw : {};
  const normalizeList = value => Array.isArray(value) ? value.map(normalizeCheck).filter(Boolean) : [];
  const technical = normalizeList(data.technical);
  const biometric = normalizeList(data.biometric);
  const tamper = normalizeList(data.tamper);
  const checks = Array.isArray(data.checks) ? normalizeList(data.checks) : [...technical, ...biometric, ...tamper];
  const score = Number(data.overall_score);
  return {
    ...data,
    ok: Boolean(data.ok),
    status: data.status || 'fail',
    overall_score: Number.isFinite(score) ? score : 0,
    errors: Array.isArray(data.errors) ? data.errors : [],
    warnings: Array.isArray(data.warnings) ? data.warnings : [],
    technical,
    biometric,
    tamper,
    checks
  };
}

// ✅ FIX 2: Fully localized row rendering with translated recommendations
function renderRows(items){
  const normalizedItems = Array.isArray(items) ? items.map(normalizeCheck).filter(Boolean) : [];
  if(normalizedItems.length === 0){
    rows.innerHTML = '<div style="text-align:center;color:var(--sub);padding:20px" data-i18n="no_results">Upload and validate a photo to see results</div>';
    applyI18N();
    return;
  }
  
  rows.innerHTML = normalizedItems.map(p=>{
    const cls = p.status==='pass'?'pass':(p.status==='warning'||p.status==='skipped'?'warn':'fail');
    
    // ✅ FIX: Get parameter name safely (backend includes both 'parameter' and 'name')
    const paramName = String(p.parameter || p.name || 'Unknown Check');
    
    // ✅ Translate parameter name
    const label = I18N[LANG][paramName] || paramName;
    
    const cur = p.value ?? '—';
    const exp = p.expected ?? '—';
    
    // ✅ FIX: Use translated recommendations and fixes
    const recKey = 'rec_' + paramName.replace(/\s/g, '');
    const fixKey = 'fix_' + paramName.replace(/\s/g, '');
    
    const rec = I18N[LANG][recKey] ? 
      `<div class="rec">${escapeHTML(I18N[LANG][recKey])}</div>` : 
      (p.recommendation ? `<div class="rec">${escapeHTML(p.recommendation)}</div>` : '');
      
    const fix = I18N[LANG][fixKey] ? 
      `<div class="fix">💡 ${escapeHTML(I18N[LANG][fixKey])}</div>` : 
      (p.how_to_fix ? `<div class="fix">💡 ${escapeHTML(p.how_to_fix)}</div>` : '');
    
    return `
      <div class="row ${cls}" onclick="this.classList.toggle('open')">
        <div class="summary">
          <span class="status">${rowIcon(p.status)}</span>
          <span class="label">${escapeHTML(label)}</span>
          <span class="value">${escapeHTML(cur)}</span>
          <span class="expected">${escapeHTML(exp)}</span>
        </div>
        ${rec || fix ? `<div class="details">${rec}${fix}</div>` : ''}
      </div>`;
  }).join('');
}

// Render top-level summary banners (errors / warnings / manual review)
function renderBanners(j){
  const dict = I18N[LANG] || I18N.en;
  const tr = k => (dict[k] || I18N.en[k] || k);
  const sections = [
    {items: j && j.errors,        cls: 'fail',   label: tr('banner_errors')},
    {items: j && j.warnings,      cls: 'warn',   label: tr('banner_warnings')},
    {items: j && j.manual_review, cls: 'review', label: tr('banner_review')}
  ];
  let html = '';
  sections.forEach(s=>{
    const items = Array.isArray(s.items) ? s.items : [];
    if(!items.length) return;
    html += `<div class="banner ${s.cls}"><div class="banner-title">${escapeHTML(s.label)}</div><ul>`
          + items.map(x=>`<li>${escapeHTML(x)}</li>`).join('') + `</ul></div>`;
  });
  const el = document.getElementById('banners');
  el.innerHTML = html;
  el.style.display = html ? 'block' : 'none';
}

// Validate with backend API
async function runValidate(file, overrides){
  const fd = new FormData();
  fd.append('file', file);
  if(overrides) fd.append('overrides', JSON.stringify(overrides));
  
  const res = await fetch(`${API_BASE}/validate`, {method:'POST', body:fd});
  const payload = normalizeResponse(await res.json().catch(()=>({})));
  if(!res.ok) {
    const message = payload.errors[0] || `HTTP ${res.status}`;
    throw new Error(message);
  }
  return payload;
}

// File upload handlers
function handleFile(file){
  if(!file || !file.type.startsWith('image/')) return;
  
  currentFile = file;
  const url = URL.createObjectURL(file);
  
  img.src = url;
  img.onload = ()=>{
    dropZone.style.display = 'none';
    previewWrap.style.display = 'flex';
    controls.style.display = 'flex';
    validateBtn.disabled = false;
    // ✅ Show "New Photo" button after upload
    document.getElementById('newPhotoBtn').style.display = 'inline-block';
    syncOverlay();
    URL.revokeObjectURL(url);
  };
  
  dropZone.classList.add('has-file');
}

fileInput.addEventListener('change', ev=>{
  const f = ev.target.files?.[0];
  if(f) handleFile(f);
});

dropZone.addEventListener('click', ()=> fileInput.click());

// Drag & drop
dropZone.addEventListener('dragover', e=>{
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', ()=>{
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', e=>{
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if(file) handleFile(file);
});

// Validate button
validateBtn.addEventListener('click', async()=>{
  if(!currentFile) return;
  
  const originalText = validateBtn.textContent;
  validateBtn.disabled = true;
  validateBtn.innerHTML = `<span class="spinner"></span> ${I18N[LANG].validating}`;
  
  try {
    const overrides = pendingManualOverrides || (manualMode ? currentManualOverrides() : undefined);
    pendingManualOverrides = null;
    lastUsedOverrides = overrides || null;
    const j = await runValidate(currentFile, overrides);
    lastValidationResult = j;
    
    // Preserve exact manual percentages after Save & Re-check; otherwise use detected pixels.
    const hh = (j.checks||j.biometric||[]).find(p=>(p.parameter||p.name)==='Head Height' && p.faceBox);
    if(overrides){
      lines.top = overrides.top;
      lines.eye = overrides.eye;
      lines.chin = overrides.chin;
    } else if(hh && hh.faceBox && img.naturalHeight){
      lines.top = hh.faceBox.top / img.naturalHeight;
      lines.eye = hh.faceBox.eyeY / img.naturalHeight;
      lines.chin = hh.faceBox.bottom / img.naturalHeight;
    }
    
    updateScoreMeter(j.overall_score);
    const items = [...(j.technical||[]), ...(j.biometric||[]), ...(j.tamper||[])];
    renderRows(items);
    renderBanners(j);
    drawOverlay();
    document.getElementById('downloadPdfBtn').style.display = 'block';
    
    // ✅ UX Enhancement: Smooth scroll to results and highlight issues
    setTimeout(() => {
      document.querySelector('.results').scrollIntoView({behavior: 'smooth', block: 'start'});
      
      // Highlight failed/warning items with animation
      document.querySelectorAll('.row.fail, .row.warn').forEach(el => {
        el.animate([
          { opacity: 0.5, transform: 'scale(0.98)' },
          { opacity: 1, transform: 'scale(1)' }
        ], { duration: 600, easing: 'ease-out' });
      });
    }, 300);
    
  } catch(err) {
    alert(`Validation error: ${err.message}`);
  } finally {
    validateBtn.disabled = false;
    validateBtn.textContent = originalText;
  }
});

// Manual mode controls
document.getElementById('manualBtn').addEventListener('click',()=>{ 
  manualMode = !manualMode;
  document.getElementById('saveManualBtn').style.display = manualMode?'inline-block':'none';
  document.getElementById('resetManualBtn').style.display = manualMode?'inline-block':'none';
  overlay.style.cursor = manualMode ? 'ns-resize' : 'default';
});

document.getElementById('saveManualBtn').addEventListener('click',()=>{
  pendingManualOverrides = currentManualOverrides();
  manualMode = false;
  document.getElementById('saveManualBtn').style.display = 'none';
  document.getElementById('resetManualBtn').style.display = 'none';
  overlay.style.cursor = 'default';
  validateBtn.click(); // Re-validate with manual overrides
});

document.getElementById('resetManualBtn').addEventListener('click',()=>{
  // Reset to last auto-detected values
  if(lastValidationResult){
    const hh = (lastValidationResult.checks||lastValidationResult.biometric||[]).find(p=>(p.parameter||p.name)==='Head Height' && p.faceBox);
    if(hh && hh.faceBox && img.naturalHeight){
      lines.top = hh.faceBox.top / img.naturalHeight;
      lines.eye = hh.faceBox.eyeY / img.naturalHeight;
      lines.chin = hh.faceBox.bottom / img.naturalHeight;
      drawOverlay();
    }
  }
});

// Download PDF report
document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
  if(!currentFile) return;
  const btn = document.getElementById('downloadPdfBtn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = I18N[LANG].downloading || 'Preparing PDF…';
  try {
    const fd = new FormData();
    fd.append('file', currentFile);
    if(lastUsedOverrides) fd.append('overrides', JSON.stringify(lastUsedOverrides));
    const res = await fetch(`${API_BASE}/report`, {method:'POST', body:fd});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'dv-photo-report.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch(err) {
    alert(`Could not generate PDF: ${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
});

// Show hints toggle
showHints.addEventListener('change', drawOverlay);

// ✅ New Photo button - reset everything
document.getElementById('newPhotoBtn').addEventListener('click', () => {
  currentFile = null;
  lastValidationResult = null;
  lastUsedOverrides = null;
  document.getElementById('downloadPdfBtn').style.display = 'none';

  // Reset image
  img.src = '';
  
  // Reset UI
  dropZone.style.display = 'block';
  previewWrap.style.display = 'none';
  controls.style.display = 'none';
  document.getElementById('newPhotoBtn').style.display = 'none';
  
  // Reset validation results
  rows.innerHTML = '<div style="text-align:center;color:var(--sub);padding:20px" data-i18n="no_results">Upload and validate a photo to see results</div>';
  renderBanners(null);
  updateScoreMeter(0);
  scorePct.textContent = '–%';
  
  // Reset manual mode
  manualMode = false;
  document.getElementById('saveManualBtn').style.display = 'none';
  document.getElementById('resetManualBtn').style.display = 'none';
  
  // Reset lines to default
  lines.top = 0.18;
  lines.eye = 0.60;
  lines.chin = 0.86;
  
  applyI18N();
});

// Language selector
document.getElementById('langSelect').addEventListener('change', e=>{
  LANG = I18N[e.target.value] ? e.target.value : 'en';
  localStorage.setItem('lang', LANG);
  applyI18N();

  // ✅ Re-render validation results if they exist (to translate labels)
  if(lastValidationResult) {
    const items = [...(lastValidationResult.technical||[]), ...(lastValidationResult.biometric||[]), ...(lastValidationResult.tamper||[])];
    renderRows(items);
  }
  renderBanners(lastValidationResult);
});

// Dark mode toggle
document.getElementById('darkToggle').addEventListener('click',()=>{ 
  const on = !document.documentElement.classList.contains('dark'); 
  document.documentElement.classList.toggle('dark', on); 
  localStorage.setItem('dark', on?'1':'0'); 
  drawOverlay(); 
});

// Initial
document.getElementById('langSelect').value = LANG;
applyI18N();
</script>
</body>
</html>
